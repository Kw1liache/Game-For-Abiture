version: "3.9"

services:
  db:
    image: postgres:16
    container_name: back-user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  user-service:
    build: ./back-user
    container_name: back-user-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./back-user/.env
    ports:
      - "8000:8000"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000

volumes:
  postgres_data: